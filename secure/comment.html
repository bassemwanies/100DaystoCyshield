<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments | Day 2</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="comments.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=VT323&display=swap"
        rel="stylesheet">
</head>

<body style="background-image: url('https://i.pinimg.com/736x/18/43/b2/1843b214f3d0ffca016cccc2d90f6bf4.jpg');">

    <div class="header">

        <div class="text">
            <a href="https://github.com/bassemwanies">
                <img src="https://github.com/favicon.ico" style="height: 40px;">
            </a>
        </div>

        <div class="text vt323-regular">
            <h1>
                100 Days to
                <span style="color:#ad2429;">C Y S H I E L
                    <span style="color:#2f3291;">D</span>
                </span>
            </h1>
        </div>

        <div class="text">
            <a href="https://medium.com/@bassemwanies2002">
                <img src="https://cdn-icons-png.flaticon.com/128/3670/3670068.png" style="height:40px;">
            </a>
        </div>

    </div>

    <div class="comments-page">

        <!-- Painting -->
        <div class="painting">
            <img src="https://wallpapers.com/images/thumbnail/mona-lisa-with-mustache-0l5klkqfjb1qh9gp.webp">

            <h2>Mona Lisa</h2>
            <p>Leonardo da Vinci</p>
        </div>

        <!-- Comment Form -->
        <div class="comment-form">

            <h3 class="text">Leave a Comment</h3>

            <form id="commentForm">

                <input class="text" type="text" id="username" placeholder="Your name" required>

                <textarea class="text" id="comment" placeholder="Write your comment..." required></textarea>

                <button type="submit">
                    Post Comment
                </button>

            </form>

        </div>

        <!-- Comments List -->
        <div class="comments-list">

            <h3>Comments</h3>

            <div id="commentsContainer">



            </div>

        </div>

    </div>

</body>

</html>
